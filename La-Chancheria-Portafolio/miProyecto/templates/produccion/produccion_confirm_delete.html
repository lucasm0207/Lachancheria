{% extends 'base.html' %}
{% block title %}Eliminar Producción{% endblock %}

{% block content %}
<div class="container mt-4">
  <h2>Eliminar Producción</h2>
  <div class="card p-3">
    <p>¿Estás seguro que querés eliminar la producción <strong>#{{ produccion.Id_produccion }}</strong> ({{ produccion.receta.nombre }})?</p>
    <form method="post">
      {% csrf_token %}
      <button class="btn btn-danger" type="submit">Sí, eliminar</button>
      <a href="{% url 'produccion_list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
