{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-lg">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">
            <i class="fas fa-key"></i> Cambiar contraseña
          </h4>
        </div>
        <div class="card-body">
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-bold">{{ form.old_password.label }}</label>
              {{ form.old_password }}
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">{{ form.new_password1.label }}</label>
              {{ form.new_password1 }}
              <div class="form-text mt-2">
                {{ form.new_password1.help_text }}
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">{{ form.new_password2.label }}</label>
              {{ form.new_password2 }}
            </div>
            <hr>
            <div class="d-flex justify-content-between">
              <a href="{% url 'configuracion' %}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Volver
              </a>
              <button type="submit" class="btn btn-success">
                <i class="fas fa-save"></i> Guardar cambio
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
