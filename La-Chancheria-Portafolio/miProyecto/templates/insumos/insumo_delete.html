{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3>Eliminar Insumo</h3>
                </div>
                <div class="card-body">
                    <div class="alert alert-warning">
                        <h5>¿Estás seguro de que quieres eliminar este insumo?</h5>
                        <p class="mb-0"><strong>{{ insumo.name }}</strong></p>
                        <p class="text-muted">Stock actual: {{ insumo.stock_quantity }}</p>
                        <p class="text-danger"><strong>¡Esta acción no se puede deshacer!</strong></p>
                    </div>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-danger">Sí, Eliminar</button>
                            <a href="{% url 'insumo_list' %}" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
