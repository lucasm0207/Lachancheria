{% extends 'base.html' %}

{% block title %}Eliminar Cliente{% endblock %}

{% block content %}
<div class="card p-4 shadow-sm">
  <h2 class="mb-3">¿Eliminar Cliente?</h2>
  <p>¿Estás seguro de que querés eliminar a <strong>{{ cliente.Nombre }}</strong>?</p>

  <form method="post" class="mt-3 d-flex gap-3">
    {% csrf_token %}
    <button type="submit" class="btn btn-del">Sí, eliminar</button>
    <a href="{% url 'cliente_list' %}" class="btn btn-secondary">Cancelar</a>
  </form>
</div>
{% endblock %}
