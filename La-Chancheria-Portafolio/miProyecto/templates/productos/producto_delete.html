{% extends 'base.html' %}

{% block title %}Eliminar Producto{% endblock %}

{% block content %}
<div class="card p-4 shadow-sm">
  <h2 class="mb-3">¿Eliminar Producto?</h2>
  <p>¿Estás seguro de que querés eliminar <strong>{{ producto.Corte }}</strong>?</p>

  <form method="post" class="mt-3 d-flex gap-3">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
    <a href="{% url 'producto_list' %}" class="btn btn-secondary">Cancelar</a>
  </form>
</div>
{% endblock %}
